<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#121212"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B2928;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#121212;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#098C04;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#29BA1F;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#29BA1F;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#29BA1F;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Glow effect -->
  <circle cx="300" cy="315" r="300" fill="url(#glow)"/>
  
  <!-- Hexagon logo -->
  <path d="M300 115L450 202.5V377.5L300 465L150 377.5V202.5L300 115Z" fill="url(#hexGrad)"/>
  
  <!-- Lightning bolt -->
  <path d="M320 200L260 300H290L275 430L335 330H305L320 200Z" fill="#121212" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text -->
  <text x="520" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="900" fill="#FFFFFF">
    Rapidoss
  </text>
  <text x="520" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#29BA1F">
    Livraison à la demande
  </text>
  <text x="520" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="300" fill="#525252">
    Kinshasa • RDC
  </text>
  
  <!-- Decorative elements -->
  <circle cx="1050" cy="150" r="3" fill="#29BA1F" opacity="0.6"/>
  <circle cx="1100" cy="200" r="2" fill="#29BA1F" opacity="0.4"/>
  <circle cx="980" cy="180" r="2" fill="#29BA1F" opacity="0.5"/>
  <circle cx="1120" cy="480" r="3" fill="#29BA1F" opacity="0.6"/>
  <circle cx="1000" cy="520" r="2" fill="#29BA1F" opacity="0.4"/>
</svg>
